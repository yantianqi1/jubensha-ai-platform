services:
  postgres:
    image: postgres:16-alpine
    container_name: jubensha_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jubensha
      POSTGRES_PASSWORD: jubensha_dev
      POSTGRES_DB: jubensha
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jubensha"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jubensha_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
